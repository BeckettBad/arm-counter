<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- Mode selector -->
    <div class="mode-toggle" role="tablist">
      <button class="mode-btn active" data-mode="lines" role="tab">Lines</button>
      <button class="mode-btn"        data-mode="bags"  role="tab">Bags</button>
    </div>

    <!-- Current photo circle -->
    <div class="photo-wrapper" id="photo-wrapper"
         role="button" tabindex="0" aria-label="Upload photo to add count">
      <img id="display-photo" src="cover.jpg" alt="Current photo"
           onerror="this.style.display='none';
                    document.getElementById('photo-placeholder').style.display='flex';">
      <div class="photo-placeholder" id="photo-placeholder" style="display:none;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>Tap to add</span>
      </div>
      <div class="upload-hint">Tap to add +1</div>
    </div>

    <!-- History strip — sits directly under the photo -->
    <div class="history-strip" id="history-strip">
      <span class="history-empty" id="history-empty">No uploads yet</span>
    </div>

    <input type="file" id="photo-input" accept="image/*"
           style="display:none;" aria-hidden="true">

    <!-- Count -->
    <div class="count-display">
      <span class="count-number" id="count-number">0</span>
      <span class="count-label"  id="count-label">lines</span>
    </div>

    <!-- Rage meter -->
    <div class="rage-section">
      <div class="rage-header">
        <span class="rage-label"    id="rage-label">CALM</span>
        <span class="rage-fraction" id="rage-fraction">0 / 30</span>
      </div>
      <div class="rage-track">
        <div class="rage-fill" id="rage-fill"></div>
      </div>
    </div>

    <!-- Upload -->
    <button class="upload-btn" id="upload-btn">Add +1 with photo</button>

    <div class="timer-row">
      <span class="timer">Resets in <span id="countdown">--:--:--</span></span>
      <button id="reset-btn" class="reset-btn">Reset</button>
    </div>

  </div>

  <!-- Name prompt modal -->
  <div class="name-modal" id="name-modal" style="display:none;"
       role="dialog" aria-modal="true" aria-label="Enter a name">
    <div class="name-modal-card">
      <p class="name-modal-title">Who is this?</p>
      <input type="text" id="name-input" placeholder="Enter a name…"
             maxlength="30" autocomplete="off" autocapitalize="words">
      <div class="name-modal-actions">
        <button id="name-skip">Skip</button>
        <button id="name-confirm">Add</button>
      </div>
    </div>
  </div>

  <!-- Lightbox for full-size history photo -->
  <div class="lightbox" id="lightbox" style="display:none;"
       role="dialog" aria-modal="true">
    <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
    <img id="lightbox-img" src="" alt="Full size photo">
    <div class="lightbox-count-controls" id="lightbox-count-controls">
      <button class="lightbox-count-btn" id="lightbox-count-minus" aria-label="Decrease count">−</button>
      <span class="lightbox-count-val" id="lightbox-count-val">1</span>
      <button class="lightbox-count-btn" id="lightbox-count-plus" aria-label="Increase count">+</button>
    </div>
    <div class="lightbox-info" id="lightbox-info"></div>
    <span class="lightbox-close" id="lightbox-close"
          role="button" tabindex="0">×</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
