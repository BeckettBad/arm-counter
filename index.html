<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arm Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Arm Counter</h1>

    <div class="timer-bar">
      <span>Resets in:</span>
      <span id="countdown">--:--:--</span>
    </div>

    <!-- Rotating photo pool display -->
    <div class="photo-wrapper" id="photo-wrapper" role="button"
         aria-label="Add photo to pool" tabindex="0">
      <div class="photo-placeholder" id="photo-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>Add photos to pool</span>
      </div>
      <img id="arm-photo" src="" alt="Current arm photo" style="display:none;">
      <div class="upload-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Add to pool</span>
      </div>
    </div>

    <!-- Pool management row -->
    <div class="pool-controls">
      <span class="pool-badge" id="pool-badge"></span>
      <button class="pool-clear" id="pool-clear" style="display:none"
              aria-label="Clear photo pool">Clear pool</button>
    </div>

    <input type="file" id="photo-input" accept="image/*" multiple
           style="display:none;" aria-hidden="true">

    <!-- Rage meter -->
    <div class="rage-section">
      <div class="rage-header">
        <span class="rage-label" id="rage-label">CALM</span>
        <span class="rage-fraction" id="rage-fraction">0 / 20</span>
      </div>
      <div class="rage-track" aria-label="Rage meter">
        <div class="rage-fill" id="rage-fill"></div>
      </div>
    </div>

    <!-- Counter -->
    <div class="counter-section">
      <div class="count-display">
        <span id="arm-count">0</span>
        <span class="label">arms</span>
      </div>
      <div class="controls">
        <button class="btn-round" id="btn-minus" aria-label="Remove arm">−</button>
        <input type="range" id="arm-slider" min="0" max="20" value="0"
               aria-label="Arm count slider">
        <button class="btn-round" id="btn-plus" aria-label="Add arm">+</button>
      </div>
    </div>

    <!-- Per-arm finger links -->
    <div class="arms-list" id="arms-list" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
